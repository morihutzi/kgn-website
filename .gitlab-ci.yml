# ============================================================================
# Website-Deploy: baut den statischen Next.js-Export im node:20-Container und
# lädt ihn per SFTP (nativ via Node, wie FileZilla) nach www-kidgonet (live).
#
# Build UND Deploy in EINEM Job, damit das große out/-Verzeichnis nicht als
# Artifact über den GitLab-Server muss (sonst 413). Deploy via Node-Script
# scripts/sftp-deploy.cjs + ssh2-sftp-client (Passwort-Auth, kein ssh/sshpass).
#
# Läuft auf dem Docker-Instance-Runner (#3). Kein Server-Eingriff nötig.
#
# CI/CD-Variablen (Settings -> CI/CD -> Variables, "Protected"):
#   FTP_HOST        dedi3215.your-server.de   (nur Host, ohne Schema/Port)
#   FTP_USER        kdg2023_1
#   FTP_PASS        SFTP-Passwort             (exakt, ohne Quotes/Whitespace!)
#   FTP_TARGET_DIR  Zielordner, z.B. /www-kidgonet
# Optionale Build-Variablen:
#   NEXT_PUBLIC_GA_ID, NEXT_PUBLIC_GADS_ID, BREVO_API_KEY, BREVO_LIST_ID
#
# Manuelle Diagnose bei Verbindungsproblemen (lokal, kein CI-Job nötig):
#   CHECK_ONLY=1 DEBUG_SFTP=1 FTP_HOST=... FTP_USER=... FTP_PASS=... \
#     FTP_TARGET_DIR=/www-kidgonet node scripts/sftp-deploy.cjs
# ============================================================================

stages:
  - deploy

deploy:website:
  stage: deploy
  image: node:20-bookworm-slim
  variables:
    NEXT_TELEMETRY_DISABLED: "1"
  cache:
    - key: website-pnpm
      when: always
      paths:
        - .pnpm-store/
    - key: website-images
      when: always
      paths:
        - public/**/nextImageExportOptimizer/
        - public/next-image-export-optimizer-hashes.json
  before_script:
    - corepack enable
    - corepack prepare pnpm@10 --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
  script:
    - pnpm install --frozen-lockfile
    - pnpm build
    # Sicherstellen, dass die .htaccess wirklich mit im Export liegt
    - test -f out/.htaccess
    # SFTP-Deploy (nativ via Node, Passwort-Auth)
    - npm install --no-save --no-fund --no-audit --prefix /tmp/sftp ssh2-sftp-client
    - NODE_PATH=/tmp/sftp/node_modules node scripts/sftp-deploy.cjs
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: production
    url: https://www.kidgonet.de
