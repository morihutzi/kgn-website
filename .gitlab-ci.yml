# ============================================================================
# Website-Deploy: baut den statischen Next.js-Export im node:20-Container und
# spiegelt ihn per SFTP (Port 22) nach www-kidgonet (live).
#
# Build UND Deploy laufen in EINEM Job, damit das große out/-Verzeichnis nicht
# als Artifact über den GitLab-Server transferiert werden muss (sonst 413).
# lftp + sshpass + openssh-client werden per apt im node-Image nachgezogen.
#
# Deploy via SFTP statt FTP: Host spricht SSH File Transfer Protocol auf Port
# 22 (FileZilla "SFTP"). lftp nutzt das sftp-Subsystem über ssh; sshpass
# liefert das Passwort nicht-interaktiv.
#
# CI/CD-Variablen (Settings -> CI/CD -> Variables, "Protected"):
#   FTP_HOST        dedi3215.your-server.de   (nur Host, ohne Schema/Port)
#   FTP_USER        kdg2023_1
#   FTP_PASS        SFTP-Passwort             (als "Masked" anlegen)
#   FTP_TARGET_DIR  Zielordner, z.B. /www-kidgonet
# Optionale Build-Variablen (falls genutzt):
#   NEXT_PUBLIC_GA_ID, NEXT_PUBLIC_GADS_ID, BREVO_API_KEY, BREVO_LIST_ID
# ============================================================================

stages:
  - test
  - deploy

# ─── Manueller SFTP-Schnelltest (ohne Build) ───────────────────────────────
# Per Hand in GitLab starten (Pipeline -> sftp:test -> Run). Prüft nur Login +
# Verzeichnis-Listing mit Debug-Log. Schnell, zum Diagnostizieren.
sftp:test:
  stage: test
  image: node:20-bookworm-slim
  when: manual
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends lftp sshpass openssh-client
  script:
    - export SSHPASS="$FTP_PASS"
    - 'echo "DIAG pwlen: ${#SSHPASS} (erwartet 24)"'
    - |
      lftp -d -c "
      set sftp:auto-confirm yes;
      set sftp:connect-program 'sshpass -e ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null';
      set net:max-retries 1;
      set net:timeout 15;
      open -u '$FTP_USER','$FTP_PASS' sftp://$FTP_HOST;
      cls -l '$FTP_TARGET_DIR';
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─── Build + Deploy ────────────────────────────────────────────────────────
deploy:website:
  stage: deploy
  image: node:20-bookworm-slim
  variables:
    NEXT_TELEMETRY_DISABLED: "1"
  # Caches überleben Jobs und sparen Zeit. when: always → auch bei Fehlschlag
  # gespeichert, damit ein erneuter Versuch nicht wieder ~4 min optimiert.
  cache:
    - key: website-pnpm
      when: always
      paths:
        - .pnpm-store/
    - key: website-images
      when: always
      paths:
        - public/**/nextImageExportOptimizer/
        - public/next-image-export-optimizer-hashes.json
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends lftp sshpass openssh-client
    - corepack enable
    - corepack prepare pnpm@10 --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
  script:
    - pnpm install --frozen-lockfile
    - pnpm build
    # Sicherstellen, dass die .htaccess wirklich mit im Export liegt
    - test -f out/.htaccess
    - export SSHPASS="$FTP_PASS"
    - |
      lftp -c "
      set sftp:auto-confirm yes;
      set sftp:connect-program 'sshpass -e ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null';
      set net:max-retries 2;
      set net:timeout 20;
      open -u '$FTP_USER','$FTP_PASS' sftp://$FTP_HOST;
      mirror --reverse --delete --verbose=1 --no-perms \
        --exclude-glob medienfuehrerschein/ \
        out/ '$FTP_TARGET_DIR';
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: production
    url: https://www.kidgonet.de
