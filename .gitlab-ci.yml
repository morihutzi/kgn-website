# ============================================================================
# Website-Deploy: baut den statischen Next.js-Export im node:20-Container und
# spiegelt ihn per FTP nach www-kidgonet (live).
#
# Build UND Deploy laufen in EINEM Job, damit das große out/-Verzeichnis nicht
# als Artifact über den GitLab-Server transferiert werden muss (sonst 413
# "Request Entity Too Large"). lftp wird per apt im node-Image nachgezogen.
#
# Läuft auf dem Docker-Instance-Runner (#3). Auf keinem Server wird etwas
# installiert. Auf den FTP-Webserver braucht man keinen Zugang, nur die Daten.
#
# Benötigte CI/CD-Variablen (Settings -> CI/CD -> Variables, "Protected"):
#   FTP_HOST        z.B. ftp.kidgonet.de  (nur Host, ohne ftp://)
#   FTP_USER        FTP-Benutzer
#   FTP_PASS        FTP-Passwort           (als "Masked" anlegen)
#   FTP_TARGET_DIR  Zielordner auf dem Server, z.B. /www-kidgonet
# Optionale Build-Variablen (falls genutzt):
#   NEXT_PUBLIC_GA_ID, NEXT_PUBLIC_GADS_ID, BREVO_API_KEY, BREVO_LIST_ID
# ============================================================================

stages:
  - deploy

deploy:website:
  stage: deploy
  image: node:20-bookworm-slim
  variables:
    NEXT_TELEMETRY_DISABLED: "1"
  # Caches überleben Jobs und sparen Zeit:
  #  - pnpm-Store: kein erneuter Download aller Pakete
  #  - Bild-Optimierer: nur geänderte Bilder werden neu optimiert (statt ~4 min)
  cache:
    - key: website-pnpm
      paths:
        - .pnpm-store/
    - key: website-images
      paths:
        - public/**/nextImageExportOptimizer/
        - public/next-image-export-optimizer-hashes.json
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends lftp
    - corepack enable
    - corepack prepare pnpm@10 --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
  script:
    - pnpm install --frozen-lockfile
    - pnpm build
    # Sicherstellen, dass die .htaccess wirklich mit im Export liegt
    - test -f out/.htaccess
    - |
      lftp -c "
      set ftp:ssl-allow true;
      set ssl:verify-certificate no;
      set net:max-retries 3;
      set net:timeout 20;
      set net:persist-retries 3;
      open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
      mirror --reverse --delete --parallel=5 --verbose=1 --no-perms \
        --exclude-glob medienfuehrerschein/ \
        out/ '$FTP_TARGET_DIR';
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: production
    url: https://www.kidgonet.de
